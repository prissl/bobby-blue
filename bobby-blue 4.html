<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Bobby Blue"/>
  <title>Bobby Blue 🐾</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:#F5F2ED;}
    body{font-family:'DM Sans',sans-serif;color:#2C2825;max-width:480px;margin:0 auto;overflow-x:hidden;}
    input[type=time],input[type=date]{
      background:#F0EDE8;border:1.5px solid #DDD9D0;color:#2C2825;
      border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;
      font-size:14px;outline:none;width:100%;
    }
    input[type=time]:focus,input[type=date]:focus{border-color:#7B9EC4;}
    input::-webkit-calendar-picker-indicator{opacity:0.35;cursor:pointer;}
    button{cursor:pointer;transition:transform 0.1s;}
    button:active{transform:scale(0.97);}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:#DDD9D0;border-radius:3px;}
    #app{min-height:100vh;}
    .hidden{display:none!important;}

    /* Header */
    .header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 14px;padding-top:calc(env(safe-area-inset-top,0px) + 14px);padding-left:max(18px, env(safe-area-inset-left,18px));padding-right:max(18px, env(safe-area-inset-right,18px));background:#fff;border-bottom:1px solid #DDD9D0;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px #00000009;}
    .title{font-size:19px;font-family:'Playfair Display',serif;font-weight:800;letter-spacing:-0.3px;}
    .hsub{font-size:10px;color:#A89F94;letter-spacing:1.2px;text-transform:uppercase;margin-top:2px;}
    .tabs{display:flex;gap:6px;}
    .tab-btn{padding:7px 13px;border-radius:9px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;border:1.5px solid #DDD9D0;background:transparent;color:#7A7066;}
    .tab-btn.active{background:#4A7BA8;color:#fff;border-color:#4A7BA8;}

    /* Page */
    .page{padding:14px 14px 0;}
    .pb48{height:48px;}

    /* Card */
    .card{background:#fff;border:1px solid #DDD9D0;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px #00000008;}
    .sec-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#A89F94;font-weight:600;margin-bottom:12px;}
    .lbl{display:block;font-size:10px;color:#A89F94;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-weight:600;}

    /* Ring card */
    .summary-card{display:flex;gap:18px;align-items:center;}
    .ring-wrap{position:relative;flex-shrink:0;}
    .ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
    .ring-label{font-size:20px;font-weight:800;color:#2C2825;letter-spacing:-0.5px;font-family:'Playfair Display',serif;}
    .ring-sub{font-size:9px;color:#A89F94;text-transform:uppercase;letter-spacing:1.5px;}
    .ring-info{flex:1;display:flex;flex-direction:column;gap:7px;}
    .status-pill{display:inline-block;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700;}
    .info-text{font-size:13px;color:#7A7066;}
    .info-small{font-size:12px;color:#A89F94;}

    /* Timeline */
    .timeline-bar{position:relative;height:26px;background:#EDE9E2;border-radius:8px;overflow:hidden;}
    .tl-block{position:absolute;top:4px;bottom:4px;background:#7B9EC4;border-radius:3px;opacity:0.65;}
    .tl-tick{position:absolute;top:0;bottom:0;border-left:1px solid #DDD9D0;}
    .tl-tick-lbl{position:absolute;top:3px;left:2px;font-size:7px;color:#A89F94;}
    .micro{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#A89F94;font-weight:600;margin-bottom:6px;}

    /* Form */
    .form-row{display:flex;gap:10px;margin-bottom:10px;}
    .form-col{flex:1;}
    .form-mb{margin-bottom:10px;}
    .err{font-size:12px;color:#C0736B;margin-bottom:8px;}
    .add-btn{width:100%;padding:13px;background:#4A7BA8;color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;}

    /* Nap rows */
    .nap-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #EDE9E2;}
    .nap-bar{width:3px;height:32px;background:#7B9EC4;border-radius:3px;flex-shrink:0;}
    .nap-times{flex:1;font-size:14px;font-weight:600;color:#2C2825;}
    .nap-dur{font-size:13px;font-weight:700;color:#D4956A;min-width:50px;text-align:right;}
    .del-btn{background:none;border:none;color:#A89F94;font-size:12px;padding:4px 6px;border-radius:6px;}

    /* KPIs */
    .kpi-row{display:flex;gap:10px;margin-bottom:12px;}
    .kpi{flex:1;background:#fff;border:1px solid #DDD9D0;border-radius:14px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;}
    .kpi-val{font-size:18px;font-weight:800;font-family:'Playfair Display',serif;letter-spacing:-0.5px;}
    .kpi-lbl{font-size:9px;color:#A89F94;text-transform:uppercase;letter-spacing:0.8px;text-align:center;white-space:pre-line;line-height:1.4;}

    /* Dot calendar */
    .dot-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
    .dot-hdr{text-align:center;font-size:9px;color:#A89F94;font-weight:700;padding-bottom:2px;}
    .dot-cell{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;}
    .dot{width:6px;height:6px;border-radius:50%;}
    .legend{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#7A7066;}
    .legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

    /* Period tabs */
    .period-tabs{display:flex;gap:5px;margin:4px 0 12px;background:#EDE9E2;padding:4px;border-radius:12px;}
    .period-btn{flex:1;padding:9px 8px;border-radius:9px;border:none;background:transparent;color:#A89F94;font-weight:400;font-size:12px;font-family:'DM Sans',sans-serif;}
    .period-btn.active{background:#fff;color:#4A7BA8;font-weight:700;box-shadow:0 1px 4px #DDD9D0;}

    /* Bar chart note */
    .chart-note{font-size:10px;color:#A89F94;margin-top:8px;text-align:center;}

    /* Week/month detail rows */
    .detail-row{padding:12px 0;border-bottom:1px solid #EDE9E2;}
    .detail-top{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
    .detail-name{flex:1;font-size:13px;font-weight:600;color:#2C2825;}
    .detail-h{font-size:14px;font-weight:800;font-family:'Playfair Display',serif;}
    .detail-green{font-size:11px;color:#6BAE8E;font-weight:600;}
    .prog-track{height:5px;background:#EDE9E2;border-radius:4px;overflow:hidden;}
    .prog-bar{height:100%;border-radius:4px;transition:width 0.5s;}

    /* Journal rows */
    .journal-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #EDE9E2;}
    .j-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .j-date{flex:1;font-size:12px;color:#7A7066;}
    .j-h{font-size:13px;font-weight:700;color:#2C2825;}
    .j-naps{font-size:11px;color:#A89F94;min-width:50px;text-align:right;}

    .month-name{font-size:13px;font-weight:600;color:#2C2825;display:block;text-transform:capitalize;}
    .month-sub{font-size:11px;color:#A89F94;}
    .month-h{font-size:15px;font-weight:800;font-family:'Playfair Display',serif;display:block;}
    .month-green{font-size:11px;color:#6BAE8E;font-weight:600;}
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ─── Constants & theme ───────────────────────────────────────────────────────
const TARGET_MIN = 18, TARGET_MAX = 20;
const STORAGE_KEY = "bobby-blue-v1";
const C = { green:"#52B788", orange:"#E89350", red:"#C0736B", blue:"#7B9EC4", blueDeep:"#4A7BA8", bgSoft:"#EDE9E2", border:"#DDD9D0", text:"#2C2825", textSoft:"#A89F94", textMid:"#7A7066" };
const SL = { green:"Objectif ✓", orange:"En dessous", red:"Au-dessus" };

// ─── Helpers ─────────────────────────────────────────────────────────────────
const todayKey  = () => new Date().toISOString().slice(0,10);
const fmtDur    = ms => { if(!ms||ms<=0)return"0m"; const m=Math.floor(ms/60000),h=Math.floor(m/60),r=m%60; return h>0?`${h}h${r>0?r+"m":""}`:`${r}m`; };
const fmtH      = h => `${h.toFixed(1)}h`;
const msToTime  = ms => { if(!ms)return""; return new Date(ms).toTimeString().slice(0,5); };
const parseTime = (dateKey,t) => { if(!t)return null; const[hh,mm]=t.split(":").map(Number),d=new Date(dateKey+"T00:00:00"); d.setHours(hh,mm,0,0); return d.getTime(); };
const statusOf  = h => h>=TARGET_MIN&&h<=TARGET_MAX?"green":h<TARGET_MIN?"orange":"red";
const shortDay  = k => new Date(k+"T12:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
const dateLabel = k => new Date(k+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
const getWeekKey= k => { const d=new Date(k+"T12:00:00"),day=d.getDay()||7,m=new Date(d); m.setDate(d.getDate()-day+1); return m.toISOString().slice(0,10); };
const weekLabel = k => `Sem. ${new Date(k+"T12:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short"})}`;
const monthKey  = k => k.slice(0,7);
const monthLabel= k => { const[y,m]=k.split("-"); return new Date(y,m-1).toLocaleDateString("fr-FR",{month:"long",year:"numeric"}); };

// ─── Storage (localStorage) ───────────────────────────────────────────────────
const loadData = () => { try{ const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):{sessions:[]}; }catch{return{sessions:[]};} };
const saveData = d => { try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); }catch{} };

// ─── Seed data ────────────────────────────────────────────────────────────────
const makeSeed = () => {
  const s=[],today=new Date();
  for(let d=29;d>=0;d--){
    const dt=new Date(today); dt.setDate(today.getDate()-d);
    const key=dt.toISOString().slice(0,10);
    const naps=4+Math.floor(Math.random()*3); let hour=0;
    for(let i=0;i<naps;i++){
      hour+=1+Math.floor(Math.random()*2);
      if(hour>=23)break;
      const durH=1+Math.random()*3;
      const st=parseTime(key,`${String(hour).padStart(2,"0")}:${String(Math.floor(Math.random()*60)).padStart(2,"0")}`);
      s.push({id:`${key}-${i}`,date:key,start:st,end:st+durH*3600000});
      hour+=Math.ceil(durH);
    }
  }
  return s;
};

// ─── State ────────────────────────────────────────────────────────────────────
let state = { tab:"today", period:"days", sessions:[], fDate:todayKey(), fStart:"", fEnd:"", fErr:"" };

const init = () => {
  const data = loadData();
  state.sessions = data.sessions?.length ? data.sessions : makeSeed();
  render();
};

const setState = patch => { Object.assign(state,patch); saveData({sessions:state.sessions}); render(); };

// ─── Computed ─────────────────────────────────────────────────────────────────
const getComputed = () => {
  const { sessions } = state;
  const todaySess = sessions.filter(s=>s.date===todayKey()).sort((a,b)=>a.start-b.start);
  const todayMs = todaySess.reduce((a,s)=>a+(s.end-s.start),0);
  const todayH = todayMs/3600000;

  const cutoff30 = (()=>{ const d=new Date(); d.setDate(d.getDate()-29); return d.toISOString().slice(0,10); })();
  const byDay={};
  sessions.forEach(s=>{ if(!byDay[s.date])byDay[s.date]=[]; byDay[s.date].push(s); });
  const dayStats=Object.entries(byDay).map(([key,arr])=>{
    const ms=arr.reduce((a,s)=>a+(s.end-s.start),0);
    return{key,h:ms/3600000,status:statusOf(ms/3600000),count:arr.length};
  }).sort((a,b)=>a.key.localeCompare(b.key));
  const last30=dayStats.filter(d=>d.key>=cutoff30);

  const byWeek={};
  last30.forEach(d=>{ const wk=getWeekKey(d.key); if(!byWeek[wk])byWeek[wk]=[]; byWeek[wk].push(d); });
  const weekStats=Object.entries(byWeek).map(([wk,days])=>({
    key:wk, h:days.reduce((a,d)=>a+d.h,0)/days.length,
    green:days.filter(d=>d.status==="green").length, total:days.length,
    shortLabel:new Date(wk+"T12:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short"}),
  })).sort((a,b)=>a.key.localeCompare(b.key));

  const byMonth={};
  sessions.forEach(s=>{ const mk=monthKey(s.date); if(!byMonth[mk])byMonth[mk]=[]; byMonth[mk].push(s); });
  const monthStats=Object.entries(byMonth).map(([mk,arr])=>{
    const days={}; arr.forEach(s=>{ if(!days[s.date])days[s.date]=0; days[s.date]+=s.end-s.start; });
    const dArr=Object.values(days).map(ms=>ms/3600000);
    return{key:mk,h:dArr.reduce((a,v)=>a+v,0)/dArr.length,green:dArr.filter(h=>statusOf(h)==="green").length,total:dArr.length,shortLabel:mk.slice(5)};
  }).sort((a,b)=>a.key.localeCompare(b.key));

  const greenCount=last30.filter(d=>d.status==="green").length;
  const avgH30=last30.length?last30.reduce((a,d)=>a+d.h,0)/last30.length:0;
  const hBuckets=Array(24).fill(0);
  sessions.forEach(s=>{ let c=s.start; while(c<s.end){hBuckets[new Date(c).getHours()]++;c+=900000;} });
  const peakH=hBuckets.indexOf(Math.max(...hBuckets));

  return{todaySess,todayH,todayMs,dayStats,last30,weekStats,monthStats,greenCount,avgH30,peakH};
};

// ─── SVG Bar Chart ────────────────────────────────────────────────────────────
const barChart = (data, valueKey, colorFn, height=180) => {
  if(!data.length) return `<p style="color:${C.textSoft};font-size:13px;font-style:italic">Pas encore de données.</p>`;
  const max=Math.max(...data.map(d=>d[valueKey]||0),TARGET_MAX+2,1);
  const W=360,H=height,padL=32,padB=28,padT=16,padR=12;
  const gW=W-padL-padR,gH=H-padB-padT;
  const n=data.length;
  const barW=Math.max(4,gW/n*0.62);
  const xp=i=>padL+(i+0.5)*(gW/n);
  const yp=v=>padT+gH-(v/max)*gH;

  let rects="",lines="",labels="";

  // target zone shading
  rects+=`<rect x="${padL}" y="${yp(TARGET_MAX)}" width="${gW}" height="${yp(TARGET_MIN)-yp(TARGET_MAX)}" fill="${C.blue}20" rx="3"/>`;

  // horizontal grid lines + Y axis labels
  [0,5,10,15,20,25].filter(v=>v<=max+1).forEach(v=>{
    lines+=`<line x1="${padL}" x2="${W-padR}" y1="${yp(v)}" y2="${yp(v)}" stroke="${C.border}" stroke-width="${v===0?1:0.5}" stroke-dasharray="${v===0?"":"3,2"}"/>`;
    lines+=`<text x="${padL-5}" y="${yp(v)+3}" text-anchor="end" font-size="9" fill="${C.textSoft}" font-family="DM Sans,sans-serif">${v}h</text>`;
  });

  // target zone labels
  lines+=`<text x="${W-padR+2}" y="${yp(TARGET_MIN)+3}" font-size="7.5" fill="${C.blueDeep}bb" font-family="DM Sans,sans-serif">18h</text>`;
  lines+=`<text x="${W-padR+2}" y="${yp(TARGET_MAX)+3}" font-size="7.5" fill="${C.blueDeep}bb" font-family="DM Sans,sans-serif">20h</text>`;

  // X axis labels — show only 6 evenly spaced
  const step = Math.max(1, Math.floor(n/6));
  const labelIndices = new Set();
  for(let i=0;i<n;i+=step) labelIndices.add(i);
  labelIndices.add(n-1);

  // bars + labels
  data.forEach((d,i)=>{
    const val=d[valueKey]||0;
    const bH=Math.max((val/max)*gH, 1.5);
    const col=colorFn?colorFn(d):C.green;
    const x=xp(i);
    rects+=`<rect x="${x-barW/2}" y="${yp(val)}" width="${barW}" height="${bH}" rx="2.5" fill="${col}" opacity="0.88"/>`;
    // value label on top of bar if enough space
    if(n<=15 && val>0){
      rects+=`<text x="${x}" y="${yp(val)-3}" text-anchor="middle" font-size="7" fill="${col}" font-family="DM Sans,sans-serif" font-weight="600">${val.toFixed(1)}</text>`;
    }
    if(labelIndices.has(i)){
      labels+=`<text x="${x}" y="${H-4}" text-anchor="middle" font-size="8.5" fill="${C.textMid}" font-family="DM Sans,sans-serif">${d.shortLabel||""}</text>`;
    }
  });

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${height}px;display:block;overflow:visible">${lines}${rects}${labels}</svg>`;
};

// ─── Ring SVG ─────────────────────────────────────────────────────────────────
const ringHTML = (pct, color, label, sub, size=118) => {
  const r=(size/2)-9, circ=2*Math.PI*r, offset=circ*(1-Math.min(pct,1.08));
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${C.bgSoft}" stroke-width="7" fill="none"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="7" fill="none"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 0.7s"/>
    </svg>
    <div class="ring-inner">
      <span class="ring-label">${label}</span>
      <span class="ring-sub">${sub}</span>
    </div>
  </div>`;
};

// ─── Timeline ─────────────────────────────────────────────────────────────────
const timelineHTML = sessions => {
  const tf=ts=>(new Date(ts).getHours()*60+new Date(ts).getMinutes())/(24*60);
  const blocks=sessions.map(s=>{
    const l=tf(s.start)*100, w=Math.max((tf(s.end)-tf(s.start))*100,1.2);
    const dur=fmtDur(s.end-s.start);
    return `<div style="position:absolute;top:0;bottom:0;left:${l}%;width:${w}%;background:${C.blueDeep};border-radius:4px;opacity:0.78;display:flex;align-items:center;justify-content:center;overflow:hidden;">${w>8?`<span style="font-size:9px;color:#fff;font-weight:700;white-space:nowrap;padding:0 3px">${dur}</span>`:""}</div>`;
  }).join("");
  const tickHours=[0,3,6,9,12,15,18,21,24];
  const tickMarks=tickHours.map(h=>`<div style="position:absolute;left:${h/24*100}%;top:0;bottom:0;border-left:1px solid ${h===0||h===24?'#7A7066':'#DDD9D0'};"></div>`).join("");
  const tickLabels=tickHours.filter(h=>h<24).map(h=>`<span style="position:absolute;left:${h/24*100}%;font-size:9px;color:#A89F94;font-family:'DM Sans',sans-serif;transform:translateX(-50%);white-space:nowrap;">${h}h</span>`).join("");
  return `
    <p class="micro" style="margin-bottom:8px">Répartition sur 24h</p>
    <div style="position:relative;height:34px;background:#EDE9E2;border-radius:8px;overflow:hidden;">${tickMarks}${blocks}</div>
    <div style="position:relative;height:18px;margin-top:3px;">${tickLabels}</div>`;
};

// ─── Dot Calendar ─────────────────────────────────────────────────────────────
const dotCalendar = dayStats => {
  const last35=Array.from({length:35},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(34-i));
    const k=d.toISOString().slice(0,10);
    const found=dayStats.find(x=>x.key===k);
    const dayNum=d.getDate();
    return{k,status:found?found.status:"none",h:found?.h||0,dayNum};
  });
  const hdrs=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"].map(d=>`
    <div style="text-align:center;font-size:10px;color:${C.textSoft};font-weight:700;padding-bottom:4px;font-family:'DM Sans',sans-serif">${d}</div>`).join("");

  const colorMap = {
    green: { bg:"#52B78820", border:"#52B78866", dot:"#52B788", text:"#2C8C60" },
    orange:{ bg:"#E8935020", border:"#E8935066", dot:"#E89350", text:"#B86020" },
    red:   { bg:"#C0736B20", border:"#C0736B66", dot:"#C0736B", text:"#943030" },
    none:  { bg:C.bgSoft,    border:C.border,    dot:null,      text:C.textSoft }
  };

  const cells=last35.map(({k,status,h,dayNum})=>{
    const col=colorMap[status];
    const isToday=k===todayKey();
    const todayRing=isToday?`box-shadow:0 0 0 2px ${C.blueDeep};`:"";
    return `<div style="aspect-ratio:1;border-radius:10px;background:${col.bg};border:1.5px solid ${isToday?C.blueDeep:col.border};${todayRing}display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:default" title="${shortDay(k)}${h>0?" · "+fmtH(h):""}">
      <span style="font-size:12px;font-weight:700;color:${isToday?C.blueDeep:col.text};font-family:'DM Sans',sans-serif;line-height:1">${dayNum}</span>
      ${status!=="none"?`<span style="font-size:9px;color:${col.text};font-family:'DM Sans',sans-serif;line-height:1">${h.toFixed(0)}h</span>`:""}
    </div>`;
  }).join("");

  const legendItems=[
    {color:"#52B788", label:"Objectif ✓"},
    {color:"#E89350", label:"En dessous"},
    {color:"#C0736B", label:"Au-dessus"},
  ].map(l=>`<span style="display:flex;align-items:center;gap:5px;font-size:11px;color:${C.textMid};font-family:'DM Sans',sans-serif">
    <span style="width:10px;height:10px;border-radius:50%;background:${l.color};display:inline-block;flex-shrink:0"></span>${l.label}
  </span>`).join("");

  return `
    <p class="sec-title">Calendrier — 5 semaines</p>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:12px">${hdrs}${cells}</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap">${legendItems}</div>`;
};

// ─── Render ───────────────────────────────────────────────────────────────────
const render = () => {
  const { tab, period, fDate, fStart, fEnd, fErr, sessions } = state;
  const { todaySess, todayH, dayStats, last30, weekStats, monthStats, greenCount, avgH30, peakH } = getComputed();
  const todayStatus = statusOf(todayH);
  const pillStyle = `background:${C[todayStatus]}22;color:${C[todayStatus]};border:1px solid ${C[todayStatus]}44`;

  // TODAY content
  const todayContent = `
    <div class="card">
      <div class="summary-card" style="margin-bottom:${todaySess.length>0?'16px':'0'}">
        ${ringHTML(todayH/TARGET_MAX, C[todayStatus], fmtH(todayH), "Bobby Blue")}
        <div class="ring-info">
          <span class="status-pill" style="${pillStyle}">${SL[todayStatus]}</span>
          <span class="info-text">${todaySess.length} sieste${todaySess.length!==1?"s":""}</span>
          ${todayH<TARGET_MIN?`<span class="info-small">encore <strong style="color:#2C2825">${fmtH(TARGET_MIN-todayH)}</strong> pour l'objectif</span>`:""}
          ${todaySess.length>0?`<span class="info-small">moy. <strong style="color:#2C2825">${fmtDur(todaySess.reduce((a,s)=>a+(s.end-s.start),0)/todaySess.length)}</strong></span>`:""}
        </div>
      </div>
      ${todaySess.length>0?timelineHTML(todaySess):`<p style="color:${C.textSoft};font-size:12px;font-style:italic;margin-top:4px">Aucune sieste enregistrée — la timeline apparaîtra ici.</p>`}
    </div>
    <div class="card">
      <p class="sec-title">Ajouter une sieste</p>
      <div class="form-mb">
        <label class="lbl">Date</label>
        <input type="date" id="fDate" value="${fDate}" max="${todayKey()}"/>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="lbl">S'endort à</label><input type="time" id="fStart" value="${fStart}"/></div>
        <div class="form-col"><label class="lbl">Se réveille à</label><input type="time" id="fEnd" value="${fEnd}"/></div>
      </div>
      ${fErr?`<p class="err">${fErr}</p>`:""}
      <button class="add-btn" onclick="addSession()">+ Enregistrer la sieste</button>
    </div>
    <div class="card">
      <p class="sec-title">Siestes du jour</p>
      ${todaySess.length===0?`<p style="color:${C.textSoft};font-size:13px;font-style:italic">Aucune sieste enregistrée aujourd'hui.</p>`
        :todaySess.map(s=>`
        <div class="nap-row">
          <div class="nap-bar"></div>
          <div class="nap-times">${msToTime(s.start)} → ${msToTime(s.end)}</div>
          <span class="nap-dur">${fmtDur(s.end-s.start)}</span>
          <button class="del-btn" onclick="delSession('${s.id}')">✕</button>
        </div>`).join("")}
    </div>`;

  // STATS content
  const kpis = `
    <div class="kpi-row">
      <div class="kpi" style="border-top:3px solid ${C.green}">
        <span class="kpi-val" style="color:${C.green}">${greenCount}</span>
        <span class="kpi-lbl">jours ✓\n30 derniers</span>
      </div>
      <div class="kpi" style="border-top:3px solid ${C.blueDeep}">
        <span class="kpi-val" style="color:${C.blueDeep}">${fmtH(avgH30)}</span>
        <span class="kpi-lbl">moyenne\n30 jours</span>
      </div>
      <div class="kpi" style="border-top:3px solid ${C.orange}">
        <span class="kpi-val" style="color:${C.orange}">${peakH}h</span>
        <span class="kpi-lbl">pic de\nsommeil</span>
      </div>
    </div>`;

  const periodTabs = ["days","weeks","months"].map(v=>`<button class="period-btn${period===v?" active":""}" onclick="setPeriod('${v}')">${v==="days"?"Jours":v==="weeks"?"Semaines":"Mois"}</button>`).join("");

  let periodContent = "";
  if(period==="days"){
    const journal = last30.slice().reverse().map(d=>`
      <div class="journal-row">
        <div class="j-dot" style="background:${C[d.status]}"></div>
        <span class="j-date">${dateLabel(d.key)}</span>
        <span class="j-h">${fmtH(d.h)}</span>
        <span class="j-naps">${d.count} sieste${d.count!==1?"s":""}</span>
      </div>`).join("");
    periodContent = `
      <div class="card">
        <p class="sec-title">Heures de sommeil — 30 derniers jours</p>
        ${barChart(last30.map(d=>({...d,shortLabel:shortDay(d.key).slice(0,6)})),"h",d=>C[d.status],165)}
        <p class="chart-note">Zone bleue = objectif 18–20h</p>
      </div>
      <div class="card"><p class="sec-title">Journal</p>${journal}</div>`;
  } else if(period==="weeks"){
    const rows = weekStats.slice().reverse().map(w=>`
      <div class="detail-row">
        <div class="detail-top">
          <span class="detail-name">${weekLabel(w.key)}</span>
          <span class="detail-h" style="color:${C[statusOf(w.h)]}">${fmtH(w.h)}</span>
          <span class="detail-green">${w.green}/${w.total}j ✓</span>
        </div>
        <div class="prog-track"><div class="prog-bar" style="width:${Math.min(w.h/TARGET_MAX*100,100)}%;background:${C[statusOf(w.h)]}"></div></div>
      </div>`).join("");
    periodContent = `
      <div class="card">
        <p class="sec-title">Moyenne par semaine</p>
        ${barChart(weekStats,"h",d=>C[statusOf(d.h)],155)}
      </div>
      <div class="card"><p class="sec-title">Détail semaines</p>${rows}</div>`;
  } else {
    const rows = monthStats.slice().reverse().map(m=>`
      <div class="detail-row" style="padding:14px 0">
        <div class="detail-top" style="margin-bottom:8px">
          <div style="flex:1"><span class="month-name">${monthLabel(m.key)}</span><span class="month-sub">${m.total} jours enregistrés</span></div>
          <div style="text-align:right"><span class="month-h" style="color:${C[statusOf(m.h)]}">${fmtH(m.h)}</span><span class="month-green">${m.green} jours ✓</span></div>
        </div>
        <div class="prog-track" style="height:6px"><div class="prog-bar" style="width:${Math.min(m.h/TARGET_MAX*100,100)}%;background:linear-gradient(90deg,${C[statusOf(m.h)]}bb,${C[statusOf(m.h)]})"></div></div>
      </div>`).join("");
    periodContent = `
      <div class="card">
        <p class="sec-title">Moyenne par mois</p>
        ${barChart(monthStats,"h",d=>C[statusOf(d.h)],155)}
      </div>
      <div class="card"><p class="sec-title">Détail mois</p>${rows}</div>`;
  }

  const statsContent = `
    ${kpis}
    <div class="card">${dotCalendar(dayStats)}</div>
    <div class="period-tabs">${periodTabs}</div>
    ${periodContent}`;

  document.getElementById("app").innerHTML = `
    <header class="header">
      <div>
        <div class="title">Bobby Blue 🐾</div>
        <div class="hsub">Objectif sommeil ${TARGET_MIN}–${TARGET_MAX}h / jour</div>
      </div>
      <div class="tabs">
        <button class="tab-btn${tab==="today"?" active":""}" onclick="setTab('today')">Aujourd'hui</button>
        <button class="tab-btn${tab==="stats"?" active":""}" onclick="setTab('stats')">Stats</button>
      </div>
    </header>
    <div class="page">
      ${tab==="today"?todayContent:statsContent}
      <div class="pb48"></div>
    </div>`;

  // Re-attach live input listeners
  const fd=document.getElementById("fDate"), fs=document.getElementById("fStart"), fe=document.getElementById("fEnd");
  if(fd) fd.addEventListener("change",e=>{ state.fDate=e.target.value; });
  if(fs) fs.addEventListener("change",e=>{ state.fStart=e.target.value; });
  if(fe) fe.addEventListener("change",e=>{ state.fEnd=e.target.value; });
};

// ─── Actions ──────────────────────────────────────────────────────────────────
window.setTab    = t => setState({tab:t});
window.setPeriod = p => setState({period:p});

window.addSession = () => {
  const fDate=document.getElementById("fDate")?.value||state.fDate;
  const fStart=document.getElementById("fStart")?.value||state.fStart;
  const fEnd=document.getElementById("fEnd")?.value||state.fEnd;
  state.fDate=fDate; state.fStart=fStart; state.fEnd=fEnd;
  if(!fStart||!fEnd){setState({fErr:"Renseigne l'heure de début et de fin."});return;}
  let st=parseTime(fDate,fStart),en=parseTime(fDate,fEnd);
  if(!st||!en){setState({fErr:"Horaires invalides."});return;}
  if(en<=st)en+=86400000;
  if((en-st)>23*3600000){setState({fErr:"Durée > 23h, vérifie les horaires."});return;}
  const ns={id:`${fDate}-${st}`,date:fDate,start:st,end:en};
  const sessions=[...state.sessions.filter(s=>s.id!==ns.id),ns].sort((a,b)=>a.start-b.start);
  setState({sessions,fStart:"",fEnd:"",fErr:""});
};

window.delSession = id => {
  setState({sessions:state.sessions.filter(s=>s.id!==id)});
};

// ─── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
